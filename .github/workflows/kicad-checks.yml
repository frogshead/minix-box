name: KiCad checks

on:
  push:
    paths:
      - 'hw/kicad/**'
      - '.github/workflows/kicad-checks.yml'
  pull_request:
    paths:
      - 'hw/kicad/**'
      - '.github/workflows/kicad-checks.yml'
  workflow_dispatch:

jobs:
  erc:
    name: Schematic ERC
    runs-on: ubuntu-latest
    container:
      image: kicad/kicad:10.0
      options: --user 0
    steps:
      - uses: actions/checkout@v4
      - name: Run ERC
        run: kicad-cli sch erc --exit-code-violations --severity-all -o erc-report.rpt hw/kicad/minix-box.kicad_sch
      - name: Upload ERC report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erc-report
          path: erc-report.rpt

  drc:
    name: PCB DRC
    runs-on: ubuntu-latest
    container:
      image: kicad/kicad:10.0
      options: --user 0
    steps:
      - uses: actions/checkout@v4
      - name: Run DRC
        run: kicad-cli pcb drc --exit-code-violations --severity-all -o drc-report.rpt hw/kicad/minix-box.kicad_pcb
      - name: Upload DRC report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drc-report
          path: drc-report.rpt
